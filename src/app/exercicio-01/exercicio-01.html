<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Desconto</title>
    <link rel="stylesheet" href="exercicio-01.css">
</head>
<body>
    <div class="container">
        <h2>Cálculo de Desconto</h2>
        
        <div class="input-group">
            <label for="precoOriginal">Preço Original (R$):</label>
            <input type="number" id="precoOriginal" placeholder="Ex: 100.00" step="0.01">
        </div>

        <div class="input-group">
            <label for="percentualDesconto">Desconto (%):</label>
            <input type="number" id="percentualDesconto" placeholder="Ex: 15">
        </div>

        <button onclick="realizarCalculo()">Calcular Preço Final</button>

        <div id="resultado" class="resultado-area">
            </div>
    </div>
    <script src="exercicio-01.js"></script>
</body>
</html>
