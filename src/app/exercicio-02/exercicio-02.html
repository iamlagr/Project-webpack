<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Salário com Bônus</title>
    <link rel="stylesheet" href="exercicio-02.css">
</head>
<body>
    <div class="container">
        <h2>Gestão de Bonificação</h2>
        
        <div class="input-group">
            <label for="salarioBase">Salário Base (R$):</label>
            <input type="number" id="salarioBase" placeholder="Ex: 2500.00" step="0.01">
        </div>

        <div class="input-group">
            <label for="percentualBonus">Percentual de Bônus (%):</label>
            <input type="number" id="percentualBonus" placeholder="Ex: 10">
        </div>

        <button onclick="realizarCalculoSalario()">Calcular Salário Final</button>

        <div id="resultado" class="resultado-area">
            </div>
    </div>

    <script src="exercicio-02.js"></script>
</body>
</html>
